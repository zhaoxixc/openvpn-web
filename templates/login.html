<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenVPN Manager - Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  text-align: center;
}
.login-box h1 {
  color: #e94560;
  font-size: 24px; margin-bottom: 8px;
}
.login-box h2 {
  color: rgba(255,255,255,0.6);
  font-size: 14px; font-weight: 400; margin-bottom: 32px;
}
.login-box input {
  width: 100%; padding: 12px 16px;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #fff; font-size: 15px;
  outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: #e94560; }
.login-box button {
  width: 100%; padding: 12px;
  background: #e94560; color: #fff;
  border: none; border-radius: 8px; font-size: 16px;
  cursor: pointer; transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.9; }
.login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #e94560; font-size: 13px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>OpenVPN</h1>
  <h2>Management Console</h2>
  <input type="text" id="username" placeholder="Username" autocomplete="off">
  <input type="password" id="password" placeholder="Password">
  <button onclick="doLogin()">Sign In</button>
  <div class="error" id="error"></div>
</div>
<script>
function doLogin() {
  const btn = document.querySelector('button');
  const err = document.getElementById('error');
  btn.disabled = true;
  err.style.display = 'none';

  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      window.location.href = '/';
    } else {
      err.textContent = data.message || 'Login failed';
      err.style.display = 'block';
      btn.disabled = false;
    }
  })
  .catch(() => {
    err.textContent = 'Network error';
    err.style.display = 'block';
    btn.disabled = false;
  });
}
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
