<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenVPN Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
}

/* Header */
.header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  color: #e94560;
  font-weight: 600;
}
.header .nav { display: flex; gap: 8px; align-items: center; }
.header .nav span { color: #8b949e; font-size: 13px; }
.header .nav a {
  color: #e94560;
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 6px;
  transition: background 0.2s;
}
.header .nav a:hover { background: rgba(233,69,96,0.1); }

/* Container */
.container { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* Stats Cards */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 20px;
}
.stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; }
.stat-card .value.rx { color: #3fb950; }
.stat-card .value.tx { color: #58a6ff; }
.stat-card .value.conn { color: #d29922; }

/* Section */
.section { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 24px; margin-bottom: 20px; }
.section h2 { font-size: 16px; margin-bottom: 16px; color: #f0f6fc; }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.section-header h2 { margin-bottom: 0; }

/* Buttons */
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid #30363d;
  background: #21262d;
  color: #c9d1d9;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: #30363d; }
.btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
.btn-danger:hover { background: #f85149; }
.btn-warn { background: #9e6a03; border-color: #d29922; color: #fff; }
.btn-warn:hover { background: #bb8009; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Form */
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: #8b949e; }
.form-group input, .form-group select {
  padding: 8px 12px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  font-size: 14px;
  outline: none;
}
.form-group input:focus { border-color: #58a6ff; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #30363d; font-size: 13px; }
th { color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
tr:hover { background: rgba(255,255,255,0.03); }
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.status-dot.online { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
.status-dot.offline { background: #484f58; }

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.badge-active { background: rgba(63,185,80,0.15); color: #3fb950; }
.badge-revoked { background: rgba(248,81,73,0.15); color: #f85149; }
.badge-expiring { background: rgba(210,153,34,0.15); color: #d29922; }

.actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  max-width: 400px;
}
.toast-success { background: #238636; color: #fff; }
.toast-error { background: #da3633; color: #fff; }
@keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 24px;
  min-width: 360px;
  max-width: 90vw;
}
.modal h3 { color: #f0f6fc; margin-bottom: 16px; font-size: 16px; }
.modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.hidden { display: none !important; }

/* Refresh */
.refresh-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  color: #8b949e;
  font-size: 12px;
}
.refresh-bar .auto-refresh { display: flex; align-items: center; gap: 8px; }

/* Empty state */
.empty { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>
<div class="header">
  <h1>&#9889; OpenVPN Manager</h1>
  <div class="nav">
    <span id="clock">--</span>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">
  <!-- Traffic Stats -->
  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="label">Active Connections</div>
      <div class="value conn" id="stat-conn">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Download</div>
      <div class="value rx" id="stat-rx">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Upload</div>
      <div class="value tx" id="stat-tx">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Users</div>
      <div class="value" id="stat-users" style="color:#a371f7;">--</div>
    </div>
  </div>

  <!-- Generate User -->
  <div class="section">
    <div class="section-header">
      <h2>Generate Client</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="gen-username" placeholder="e.g. zhangsan" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Validity (days)</label>
        <input type="number" id="gen-days" value="365" min="1" max="3650">
      </div>
      <button class="btn btn-primary" onclick="generateUser()">Generate</button>
    </div>
  </div>

  <!-- Generate Outside Client -->
  <div class="section">
    <div class="section-header">
      <h2>Generate Outside Client</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="gen-ou-username" placeholder="e.g. wangwu" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Validity (days)</label>
        <input type="number" id="gen-ou-days" value="60" min="1" max="3650">
      </div>
      <div class="form-group">
        <label>OU</label>
        <input type="text" id="gen-ou" value="OUTER">
      </div>
      <button class="btn btn-primary" onclick="generateOutside()">Generate</button>
    </div>
  </div>

  <!-- User List -->
  <div class="section">
    <div class="section-header">
      <h2>Users</h2>
      <div class="refresh-bar" style="margin-bottom:0;">
        <button class="btn btn-sm" onclick="refreshAll()">Refresh</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Status</th>
            <th>Download</th>
            <th>Upload</th>
            <th>Expires</th>
            <th>Days Left</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table">
          <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <div id="modal-body">
      <p id="modal-msg"></p>
      <div id="modal-extra" class="hidden"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ─── Helpers ────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function fmtBytes(n) {
  if (!n || n === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  let v = n;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(2) + ' ' + units[i];
}

// ─── Modal ──────────────────────────────────────────────────
let modalCallback = null;
function showModal(title, msg, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-extra').classList.add('hidden');
  document.getElementById('modal-extra').innerHTML = '';
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-confirm').className = 'btn btn-danger';
  document.getElementById('modal-confirm').textContent = 'Confirm';
  modalCallback = cb;
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  modalCallback = null;
}

document.getElementById('modal-confirm').addEventListener('click', () => {
  if (modalCallback) modalCallback();
  closeModal();
});

// ─── Email Modal ────────────────────────────────────────────
function showEmailModal(username) {
  document.getElementById('modal-title').textContent = 'Send Configuration';
  document.getElementById('modal-msg').textContent = `Send .ovpn to ${username}`;
  document.getElementById('modal-extra').innerHTML = `
    <div class="form-group" style="margin-bottom:12px">
      <label>Email Address</label>
      <input type="email" id="email-input" placeholder="user@example.com" style="width:100%">
    </div>`;
  document.getElementById('modal-extra').classList.remove('hidden');
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-confirm').className = 'btn btn-primary';
  document.getElementById('modal-confirm').textContent = 'Send';
  modalCallback = () => sendEmail(username);
}
async function sendEmail(username) {
  const email = document.getElementById('email-input').value.trim();
  if (!email) { showToast('Please enter an email address', 'error'); return; }
  const data = await apiPost(`/api/users/${username}/email`, { email });
  if (data && data.success) {
    showToast(data.message, 'success');
  } else {
    showToast(data ? data.message : 'Failed to send email', 'error');
  }
}

// ─── Clock ──────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();

// ─── API Calls ──────────────────────────────────────────────
async function apiGet(path) {
  const r = await fetch(path);
  if (r.status === 401) { window.location.href = '/login'; return null; }
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body || {})
  });
  if (r.status === 401) { window.location.href = '/login'; return null; }
  return r.json();
}

// ─── Load Data ──────────────────────────────────────────────
async function loadTraffic() {
  const data = await apiGet('/api/traffic');
  if (!data || !data.success) return;
  const d = data.data;
  document.getElementById('stat-conn').textContent = d.active_connections;
  document.getElementById('stat-rx').textContent = d.total_rx_human;
  document.getElementById('stat-tx').textContent = d.total_tx_human;
}

async function loadUsers() {
  const data = await apiGet('/api/users');
  if (!data || !data.success) return;
  const users = data.data;
  document.getElementById('stat-users').textContent = users.length;

  const tbody = document.getElementById('user-table');
  if (users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No users found. Generate one above.</td></tr>';
    return;
  }

  tbody.innerHTML = users.map(u => {
    const statusHtml = u.online
      ? `<span class="status-dot online"></span><span class="badge badge-active">Online</span>`
      : u.revoked
        ? `<span class="status-dot offline"></span><span class="badge badge-revoked">Revoked</span>`
        : `<span class="status-dot offline"></span><span class="badge">Offline</span>`;

    let expireBadge = '';
    if (u.days_left !== null && u.days_left <= 30 && !u.revoked) {
      expireBadge = ` <span class="badge badge-expiring">Expiring</span>`;
    }

    let actions = '';
    if (u.online) {
      actions += `<button class="btn btn-warn btn-sm" onclick="killUser('${u.username}')">Disconnect</button>`;
    }
    if (u.ovpn_exists && !u.revoked) {
      actions += `<button class="btn btn-sm" onclick="downloadOvpn('${u.username}')">Download</button>`;
      actions += `<button class="btn btn-sm" onclick="showEmailModal('${u.username}')">Email</button>`;
    }
    if (!u.no_cert) {
      if (!u.revoked) {
        actions += `<button class="btn btn-danger btn-sm" onclick="confirmRevoke('${u.username}')">Revoke</button>`;
      } else {
        actions += `<button class="btn btn-primary btn-sm" onclick="confirmRestore('${u.username}')">Restore</button>`;
      }
    }

    return `<tr>
      <td><strong>${u.username}</strong></td>
      <td>${statusHtml}</td>
      <td>${u.rx_human || '0 B'}</td>
      <td>${u.tx_human || '0 B'}</td>
      <td>${u.expires}${expireBadge}</td>
      <td>${u.days_left !== null ? u.days_left + 'd' : '--'}</td>
      <td><div class="actions">${actions}</div></td>
    </tr>`;
  }).join('');
}

async function refreshAll() {
  await Promise.all([loadTraffic(), loadUsers()]);
}

// ─── Actions ────────────────────────────────────────────────
async function generateUser() {
  const username = document.getElementById('gen-username').value.trim();
  const days = parseInt(document.getElementById('gen-days').value) || 365;

  if (!username) { showToast('Please enter a username', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
    showToast('Username must be alphanumeric (a-z, 0-9, -, _)', 'error');
    return;
  }

  const btn = document.querySelector('#gen-username').closest('.form-row').querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const data = await apiPost('/api/users/generate', { username, days });
  btn.disabled = false;
  btn.textContent = 'Generate';

  if (data && data.success) {
    showToast(`User '${username}' created. Valid for ${days} days.`, 'success');
    document.getElementById('gen-username').value = '';
    await refreshAll();
  } else {
    showToast(data ? data.message : 'Generation failed', 'error');
  }
}

function generateOutside() {
  const username = document.getElementById('gen-ou-username').value.trim();
  const days = parseInt(document.getElementById('gen-ou-days').value) || 60;
  const ou = document.getElementById('gen-ou').value.trim() || 'OUTER';

  if (!username) { showToast('Please enter a username', 'error'); return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
    showToast('Username must be alphanumeric', 'error');
    return;
  }

  const btn = document.querySelector('#gen-ou-username').closest('.form-row').querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  apiPost('/api/users/generate-outside', { username, days, ou }).then(data => {
    btn.disabled = false;
    btn.textContent = 'Generate';
    if (data && data.success) {
      showToast(`Outside user '${username}' created. Valid for ${days} days.`, 'success');
      document.getElementById('gen-ou-username').value = '';
      refreshAll();
    } else {
      showToast(data ? data.message : 'Generation failed', 'error');
    }
  });
}

function confirmRevoke(username) {
  showModal(
    'Revoke User',
    `Are you sure you want to revoke '${username}'? They will be disconnected and unable to reconnect.`,
    () => revokeUser(username)
  );
}
async function revokeUser(username) {
  const data = await apiPost(`/api/users/${username}/revoke`);
  if (data && data.success) {
    showToast(`User '${username}' revoked.`, 'success');
    await refreshAll();
  } else {
    showToast(data ? data.message : 'Revoke failed', 'error');
  }
}

function confirmRestore(username) {
  showModal(
    'Restore User',
    `Restore '${username}'? A new certificate will be issued with the original validity period.`,
    () => restoreUser(username)
  );
}
async function restoreUser(username) {
  const data = await apiPost(`/api/users/${username}/restore`);
  if (data && data.success) {
    showToast(`User '${username}' restored.`, 'success');
    await refreshAll();
  } else {
    showToast(data ? data.message : 'Restore failed', 'error');
  }
}

async function killUser(username) {
  const data = await apiPost(`/api/users/${username}/kill`);
  if (data && data.success) {
    showToast(`User '${username}' disconnected.`, 'success');
    await refreshAll();
  } else {
    showToast(data ? data.message : 'Disconnect failed', 'error');
  }
}

function downloadOvpn(username) {
  window.open(`/api/users/${username}/download`, '_blank');
}

// ─── Init ───────────────────────────────────────────────────
document.getElementById('gen-days').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateUser();
});
document.getElementById('gen-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateUser();
});

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
